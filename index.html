<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KR GAMES - Premium Gaming Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Loading Animation Overlay -->
  <div id="global-loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-primary); z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center;">
    <div style="border: 4px solid var(--bg-secondary); border-top: 4px solid var(--neon-blue); border-radius:50%; width:70px; height:70px; animation:spin 1s linear infinite; box-shadow: var(--glow-shadow);"></div>
    <h1 class="neon-glow" style="margin-top:20px; font-family:var(--font-cyber); font-size:1.5rem; letter-spacing:4px;">INITIALIZING KR GAMES</h1>
  </div>

  <!-- Header -->
  <header>
    <div class="logo-container">
      <i class="fa-solid fa-cube neon-glow" style="color: var(--neon-blue); font-size: 2rem;"></i>
      <div class="logo-text">KR<span>GAMES</span></div>
    </div>
    <nav>
      <ul>
        <li><a href="index.html" class="active">HOME</a></li>
        <li><a href="rooms.html">MULTIPLAYER</a></li>
        <li><a href="profile.html">DASHBOARD</a></li>
      </ul>
    </nav>
    <div class="nav-buttons">
      <div id="nav-search-wrapper" style="position:relative;">
        <input type="text" id="nav-search" placeholder="Search games..." style="background:var(--bg-secondary); border:1px solid rgba(255,255,255,0.1); padding:8px 30px 8px 12px; border-radius:15px; color:#fff; font-family:var(--font-sub);">
        <i class="fa-solid fa-search" style="position:absolute; right:10px; top:11px; font-size:0.8rem; color:var(--text-muted);"></i>
      </div>
      <a href="login.html" class="btn-cyber" id="login-nav-btn" style="padding: 8px 16px; font-size: 0.8rem;">LOGIN</a>
      <span id="user-display-name" class="neon-glow" style="display:none; font-family:var(--font-cyber); font-weight:bold;"></span>
    </div>
  </header>

  <!-- Hero Content -->
  <main class="main-container">
    <div class="hero-banner">
      <h1 class="neon-glow">NEXT-GEN WEB MULTIPLAYER</h1>
      <p style="font-size: 1.2rem; max-width: 600px; color: var(--text-muted);">Experience original block-building team battles. Compete globally with optimized networking, dynamic combat systems, and custom shop integrations.</p>
      <div>
        <a href="rooms.html" class="btn-cyber">BATTLE NOW</a>
      </div>
    </div>

    <!-- Active Categories and Grid -->
    <h2 style="margin-bottom: 20px; border-left: 4px solid var(--neon-blue); padding-left: 10px;">FEATURED GAMES</h2>
    <div class="game-grid" id="featured-games-container">
      <!-- Dynamically Injected Game Cards via app.js -->
    </div>
  </main>

  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <script type="module" src="app.js"></script>
</body>
</html>
