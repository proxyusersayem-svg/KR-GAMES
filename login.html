<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KR GAMES - Database Authentication</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="display:flex; justify-content:center; align-items:center; min-height:100vh;">

  <div class="neon-border" style="background:var(--bg-secondary); padding:40px; border-radius:10px; width:100%; max-width:450px; margin: 20px;">
    <h2 class="neon-glow" style="text-align:center; font-size:1.8rem; margin-bottom:10px;">KR SECURE PORTAL</h2>
    <p style="text-align:center; color:var(--text-muted); margin-bottom:30px;">Access your player registry profiles</p>

    <form id="auth-form" style="display:flex; flex-direction:column; gap:20px;">
      <div>
        <label style="display:block; margin-bottom:8px; text-transform:uppercase; font-size:0.8rem;">Email Address</label>
        <input type="email" id="auth-email" required style="width:100%; background:var(--bg-primary); border:1px solid rgba(0,240,255,0.2); padding:12px; border-radius:4px; color:#fff; font-family:var(--font-main);">
      </div>
      <div>
        <label style="display:block; margin-bottom:8px; text-transform:uppercase; font-size:0.8rem;">Security Code (Password)</label>
        <input type="password" id="auth-password" required style="width:100%; background:var(--bg-primary); border:1px solid rgba(0,240,255,0.2); padding:12px; border-radius:4px; color:#fff; font-family:var(--font-main);">
      </div>

      <button type="submit" class="btn-cyber" id="auth-submit-btn" style="width:100%; margin-top:10px;">SIGN IN</button>
    </form>

    <div style="display:flex; justify-content:space-between; margin-top:20px; font-size:0.8rem;">
      <span style="color:var(--text-muted); cursor:pointer;" id="switch-mode-text">Need an online registry account? Sign Up</span>
    </div>
  </div>

  <script type="module">
    import { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "./firebase.js";
    import { notify } from "./app.js";

    let mode = "login";
    const authForm = document.getElementById("auth-form");
    const switchBtn = document.getElementById("switch-mode-text");
    const submitBtn = document.getElementById("auth-submit-btn");

    switchBtn.addEventListener("click", () => {
      mode = mode === "login" ? "signup" : "login";
      submitBtn.textContent = mode === "login" ? "SIGN IN" : "REGISTER PROFILE";
      switchBtn.textContent = mode === "login" ? "Need an online registry account? Sign Up" : "Have an operational ID? Sign In";
    });

    authForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("auth-email").value;
      const pass = document.getElementById("auth-password").value;

      try {
        if (mode === "login") {
          await signInWithEmailAndPassword(auth, email, pass);
          window.location.href = "index.html";
        } else {
          await createUserWithEmailAndPassword(auth, email, pass);
          notify("Account created successfully", "success");
          setTimeout(() => window.location.href = "index.html", 1500);
        }
      } catch (err) {
        notify(err.message, "error");
      }
    });
  </script>
</body>
</html>
