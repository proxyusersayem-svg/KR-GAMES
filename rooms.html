<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KR GAMES - Battle Rooms</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <header>
    <div class="logo-container">
      <i class="fa-solid fa-cube neon-glow" style="color: var(--neon-blue); font-size: 2rem;"></i>
      <div class="logo-text">KR<span>GAMES</span></div>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">HOME</a></li>
        <li><a href="rooms.html" class="active">MULTIPLAYER</a></li>
        <li><a href="profile.html">DASHBOARD</a></li>
      </ul>
    </nav>
  </header>

  <main class="main-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
      <h2 class="neon-glow"><i class="fa-solid fa-server" style="margin-right:10px;"></i>ONLINE COMBAT HUB</h2>
      <button class="btn-cyber" id="btn-create-room">CREATE MATCH ROOM</button>
    </div>

    <!-- Matchmaking / Room Directory -->
    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:30px;">
      
      <div class="profile-card" style="text-align:left;">
        <h3 style="border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px; margin-bottom:15px;">ACTIVE BATTLE ARENAS</h3>
        <div id="rooms-list-container" style="display:flex; flex-direction:column; gap:15px;">
          <!-- Rooms injected programmatically -->
          <div style="text-align:center; color:var(--text-muted); padding:40px;">No Active Rooms Found. Launch the initial server above.</div>
        </div>
      </div>

      <!-- Global Active Leaderboard Preview -->
      <div class="profile-card">
        <h3 style="border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px; margin-bottom:15px;"><i class="fa-solid fa-crown" style="color:#ffd700;"></i> LEADERBOARD</h3>
        <div id="leaderboard-sidebar" style="display:flex; flex-direction:column; gap:12px; text-align:left;">
          <!-- Dynamic sidebar from leaderboard.js -->
        </div>
      </div>

    </div>
  </main>

  <script type="module">
    import { auth, rtdb, ref, push, set, onValue } from "./firebase.js";
    import { notify } from "./app.js";

    const btnCreate = document.getElementById("btn-create-room");
    const container = document.getElementById("rooms-list-container");

    btnCreate.addEventListener("click", async () => {
      const user = auth.currentUser;
      if (!user) {
        notify("Access Denied: Please log in first", "error");
        return;
      }

      const roomsRef = ref(rtdb, "rooms");
      const newRoomRef = push(roomsRef);
      const roomPayload = {
        id: newRoomRef.key,
        host: user.displayName || user.email.split("@")[0],
        status: "waiting",
        playerCount: 1,
        maxPlayers: 8,
        createdAt: Date.now()
      };

      await set(newRoomRef, roomPayload);
      window.location.href = `game.html?room=${newRoomRef.key}`;
    });

    // Real-time synchronization of open matchmaking rooms
    onValue(ref(rtdb, "rooms"), (snapshot) => {
      const rooms = snapshot.val();
      if (!rooms) {
        container.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:40px;">No Active Rooms Found. Launch the initial server above.</div>`;
        return;
      }

      container.innerHTML = "";
      Object.keys(rooms).forEach((key) => {
        const r = rooms[key];
        const item = document.createElement("div");
        item.style.display = "flex";
        item.style.justify = "space-between";
        item.style.alignItems = "center";
        item.style.background = "var(--bg-primary)";
        item.style.border = "1px solid rgba(0, 240, 255, 0.2)";
        item.style.padding = "15px";
        item.style.borderRadius = "6px";

        item.innerHTML = `
          <div>
            <h4 style="font-family:var(--font-cyber);">${r.host.toUpperCase()}'S ARENA</h4>
            <p style="font-size:0.8rem; color:var(--text-muted);">Capacity: ${r.playerCount}/${r.maxPlayers} Players | Status: <span style="color:var(--neon-blue); font-weight:bold;">${r.status.toUpperCase()}</span></p>
          </div>
          <button class="btn-cyber" style="padding: 8px 16px; font-size: 0.8rem;" onclick="window.location.href='game.html?room=${r.id}'">JOIN MATCH</button>
        `;
        container.appendChild(item);
      });
    });
  </script>
  <script type="module" src="leaderboard.js"></script>
</body>
</html>
